<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGR_AI聊天工具</title>
    <!-- marked 静默加载（代码内实现） -->
    <style>
        /* ========== 全局CSS变量 ========== */
        :root {
            --bg-body: #f5f5f5;
            --bg-messages: white;
            --bg-input-area: white;
            --bg-modal: white;
            --bg-button: #f0f0f0;
            --bg-button-hover: #e0e0e0;
            --bg-send: #333;
            --bg-send-hover: #555;
            --bg-input: #f9f9f9;
            --border-light: #ddd;
            --border-focus: #aaa;
            --user-bubble: #e0e0e0;
            --ai-bubble: #c0c0c0;
            --text-primary: #111;
            --text-secondary: #666;
            --text-on-send: white;
            --shadow-color: rgba(0,0,0,0.05);
            --message-font-size: 15px;
            /* 按钮渐变颜色（浅色主题默认） */
            --button-start-color: #000000;
            --button-end-color: #333333;
            --button-text: #ffffff;
            --button-hover-brightness: 0.9; /* 浅色 hover 变暗 */
            /* 阴影混合颜色：浅色用黑色，深色用白色 */
            --shadow-mix-color: black;
        }

        /* 浅蓝主题（浅色，按钮黑色渐变） */
        body.theme-lightblue {
            --bg-body: #e6f0fa;
            --user-bubble: #b8d9ff;
            --ai-bubble: #8ab8ff;
            --bg-send: #2c3e50;
            --bg-send-hover: #1a2632;
            --border-light: #b0c4de;
            --shadow-mix-color: black;
        }

        /* 浅粉主题 */
        body.theme-lightpink {
            --bg-body: #fae6e6;
            --user-bubble: #ffd9d9;
            --ai-bubble: #ffb8b8;
            --bg-send: #6d4c4c;
            --bg-send-hover: #4d3636;
            --border-light: #dbb;
            --shadow-mix-color: black;
        }

        /* 淡绿主题 */
        body.theme-lightgreen {
            --bg-body: #e8f3e8;
            --user-bubble: #c8e6c8;
            --ai-bubble: #a8d5a8;
            --bg-send: #2d5a2d;
            --bg-send-hover: #1e3d1e;
            --border-light: #a8c9a8;
            --shadow-mix-color: black;
        }

        /* 淡黄主题 */
        body.theme-lightyellow {
            --bg-body: #fcf8e7;
            --user-bubble: #fff2b5;
            --ai-bubble: #ffea8a;
            --bg-send: #8a7a3a;
            --bg-send-hover: #5f5329;
            --border-light: #ecdca8;
            --shadow-mix-color: black;
        }

        /* 浅红主题 */
        body.theme-lightred {
            --bg-body: #fce8e8;
            --user-bubble: #ff9f9f;
            --ai-bubble: #ff7f7f;
            --bg-send: #b33b3b;
            --bg-send-hover: #8f2e2e;
            --border-light: #e6b0b0;
            --shadow-mix-color: black;
        }

        /* 淡紫主题 */
        body.theme-lightpurple {
            --bg-body: #f0e8fc;
            --user-bubble: #d9c9ff;
            --ai-bubble: #c2aaff;
            --bg-send: #5e4a9a;
            --bg-send-hover: #403566;
            --border-light: #c2b0e6;
            --shadow-mix-color: black;
        }

        /* 深黑主题（深色，按钮白色渐变，阴影混合白色） */
        body.theme-dark {
            --bg-body: #1e1e1e;
            --bg-messages: #2d2d2d;
            --bg-input-area: #2d2d2d;
            --bg-modal: #2d2d2d;
            --bg-button: #3a3a3a;
            --bg-button-hover: #4a4a4a;
            --bg-send: #555;
            --bg-send-hover: #777;
            --bg-input: #3a3a3a;
            --border-light: #444;
            --border-focus: #666;
            --user-bubble: #5f5f5f;
            --ai-bubble: #4a4a4a;
            --text-primary: #eee;
            --text-secondary: #aaa;
            --text-on-send: #eee;
            --shadow-color: rgba(255,255,255,0.05);
            --button-start-color: #ffffff;
            --button-end-color: #cccccc;
            --button-text: #000000;
            --button-hover-brightness: 1.2;
            --shadow-mix-color: white;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: var(--bg-body);
            height: 100vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            transition: background 0.2s, color 0.2s;
            color: var(--text-primary);
            position: relative;
            overflow-x: hidden;
        }

        /* ========== 侧边栏 ========== */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 200px;
            height: 100%;
            background: var(--bg-modal);
            border-right: 1px solid var(--border-light);
            box-shadow: 2px 0 10px var(--shadow-color);
            z-index: 1500;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            color: var(--text-primary);
            /* 右上角和右下角圆角 - 增大至40px */
            border-radius: 0 40px 40px 0;
            /* 防止内部溢出影响滚动区域 */
            overflow: hidden;
        }
        .sidebar.open {
            transform: translateX(0);
        }
        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid var(--border-light);
        }
        .sidebar-header h3 {
            margin: 0;
            font-weight: 400;
            font-size: 1.1rem;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .sidebar-header button {
            width: 32px;
            height: 32px;
            background: var(--bg-button);
            border: 1px solid var(--border-light);
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .sidebar-header button:hover {
            background: var(--bg-button-hover);
        }
        .conversation-list {
            flex: 1;
            overflow-y: auto;
            /* 底部内边距增加至20px，避免最后一个项目被圆角遮挡 */
            padding: 8px 8px 20px 8px;
            /* 确保flex子项能正确收缩 */
            min-height: 0;
        }
        .conversation-item {
            display: flex;
            align-items: center;
            padding: 6px 8px;
            border-radius: 8px;
            margin-bottom: 4px;
            cursor: pointer;
            transition: background 0.2s;
            background: var(--bg-button);
            border: 1px solid transparent;
        }
        .conversation-item:hover {
            background: var(--bg-button-hover);
        }
        .conversation-item.active {
            border-color: var(--border-focus);
            background: var(--bg-button-hover);
        }
        .conv-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 14px;
            margin-right: 8px;
            color: var(--text-primary);
            min-width: 0;
        }
        .conv-actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }
        /* 侧边栏按钮渐变（尺寸保持不变 32x32） */
        .conv-actions button {
            width: 32px;
            height: 32px;
            background: linear-gradient(to bottom right, var(--button-start-color), var(--button-end-color));
            border: 1px solid var(--border-light);
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--button-text);
            transition: filter 0.2s, background 0.2s;
            filter: brightness(1);
        }
        .conv-actions button:hover {
            filter: brightness(var(--button-hover-brightness));
        }
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: 1400;
            display: none;
        }
        .sidebar-overlay.active {
            display: block;
        }

        /* ========== 标题栏 ========== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        .header h2 {
            margin: 0;
            font-weight: 400;
            font-size: 1.3rem;
            line-height: 1.2;
            color: var(--text-primary);
        }
        .header-buttons {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        /* 标题栏按钮渐变 */
        .header-btn {
            width: 32px;
            height: 32px;
            background: linear-gradient(to bottom right, var(--button-start-color), var(--button-end-color));
            border: 1px solid var(--border-light);
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--button-text);
            transition: filter 0.2s, background 0.2s;
            filter: brightness(1);
        }
        .header-btn:hover {
            filter: brightness(var(--button-hover-brightness));
        }

        .api-key-area {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        #api-key {
            flex: 1;
            padding: 8px 10px;
            border: 1px solid var(--border-light);
            border-radius: 8px;
            font-size: 14px;
            background: var(--bg-input);
            color: var(--text-primary);
        }
        #toggle-key-btn {
            width: 36px;
            height: 36px;
            background: var(--bg-button);
            border: 1px solid var(--border-light);
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            flex-shrink: 0;
        }
        #toggle-key-btn:hover {
            background: var(--bg-button-hover);
        }

        /* ========== 消息容器 ========== */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            background: var(--bg-messages);
            border-radius: 12px;
            box-shadow: 0 2px 8px var(--shadow-color);
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            -webkit-overflow-scrolling: touch;
            will-change: scroll-position;
        }
        .message-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 85%;
        }
        .user-wrapper {
            align-self: flex-end;
        }
        .ai-wrapper {
            align-self: flex-start;
        }
        .ai-avatar, .ai-loading {
            font-size: 10px;
            color: var(--text-secondary);
            margin-bottom: 2px;
            padding-left: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .ai-loading {
            font-size: 12px;
        }
        .spinner {
            width: 12px;
            height: 12px;
            border: 2px solid var(--border-light);
            border-top-color: var(--text-secondary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .message {
            padding: 8px 12px;
            line-height: 1.5;
            word-wrap: break-word;
            white-space: pre-wrap;
            font-size: var(--message-font-size);
            width: fit-content;
            max-width: 100%;
            color: var(--text-primary);
        }
        .message:empty {
            display: none;
        }

        /* Markdown 样式 */
        .ai-message pre, .ai-message blockquote, .ai-message table {
            background-color: color-mix(in srgb, var(--ai-bubble), black 10%);
            padding: 0.5em;
            border-radius: 4px;
            overflow-x: auto;
        }
        .ai-message code {
            background-color: color-mix(in srgb, var(--ai-bubble), black 10%);
            padding: 0.2em 0.4em;
            border-radius: 3px;
            font-family: monospace;
        }
        .ai-message pre code {
            background-color: transparent;
            padding: 0;
        }

        /* 对话框样式 - 气泡 */
        body.style-bubble .user-message, body.style-bubble .ai-message {
            border-radius: 12px;
        }
        body.style-bubble .user-message {
            background: var(--user-bubble);
            border-bottom-right-radius: 4px;
        }
        body.style-bubble .ai-message {
            background: var(--ai-bubble);
            border-bottom-left-radius: 4px;
        }

        /* 安卓圆 */
        body.style-android .user-message, body.style-android .ai-message {
            border-radius: 4px;
        }
        body.style-android .user-message {
            background: var(--user-bubble);
        }
        body.style-android .ai-message {
            background: var(--ai-bubble);
        }

        /* 沉浸 */
        body.style-immersive .message-wrapper {
            max-width: calc(100% - 20px);
            width: 100%;
        }
        body.style-immersive .user-wrapper, body.style-immersive .ai-wrapper {
            width: 100%;
        }
        body.style-immersive .user-message, body.style-immersive .ai-message {
            background: transparent !important;
            border: 2px solid;
            width: calc(100% - 24px);
            max-width: none;
        }
        body.style-immersive .user-message {
            border-color: var(--user-bubble);
            margin-left: auto;
        }
        body.style-immersive .ai-message {
            border-color: var(--ai-bubble);
        }
        body.style-immersive .ai-avatar {
            margin-left: 4px;
        }

        /* 默认样式 */
        .user-message, .ai-message {
            border-radius: 12px;
        }
        .user-message {
            background: var(--user-bubble);
            border-bottom-right-radius: 4px;
        }
        .ai-message {
            background: var(--ai-bubble);
            border-bottom-left-radius: 4px;
        }

        /* ========== 对话框阴影 ========== */
        body.shadow-enabled .user-message {
            box-shadow: 0 6px 12px color-mix(in srgb, var(--user-bubble), var(--shadow-mix-color) 30%);
        }
        body.shadow-enabled .ai-message {
            box-shadow: 0 6px 12px color-mix(in srgb, var(--ai-bubble), var(--shadow-mix-color) 30%);
        }

        /* 阴影开启时，增加工具栏与气泡的距离，避免重叠 */
        body.shadow-enabled .ai-footer {
            margin-top: 10px;
        }

        .time-divider {
            text-align: center;
            font-size: 12px;
            color: var(--text-secondary);
            margin: 8px 0 4px 0;
            opacity: 0.8;
            width: 100%;
        }

        .ai-footer {
            display: flex;
            justify-content: flex-start;
            margin-top: 4px;
            margin-left: 4px;
            gap: 8px;
        }
        .copy-btn, .fullscreen-btn, .download-btn, .speak-btn {
            width: 28px;
            height: 28px;
            background: transparent;
            border: 1px solid var(--border-light);
            border-radius: 50%;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            transition: all 0.2s;
        }
        .copy-btn:hover, .fullscreen-btn:hover, .download-btn:hover, .speak-btn:hover {
            background: var(--bg-button-hover);
            border-color: var(--border-focus);
        }
        .speak-btn.speaking {
            background: var(--bg-send);
            color: var(--text-on-send);
            border-color: var(--bg-send);
        }

        #input-area {
            display: flex;
            gap: 8px;
            background: var(--bg-input-area);
            padding: 10px;
            border-radius: 20px;
            box-shadow: 0 2px 8px var(--shadow-color);
            align-items: center;
        }
        #edit-btn, #file-btn {
            width: 36px;
            height: 36px;
            background: var(--bg-button);
            border: 1px solid var(--border-light);
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: var(--text-secondary);
            transition: background 0.2s, border-color 0.2s;
        }
        #edit-btn:hover, #file-btn:hover {
            background: var(--bg-button-hover);
        }
        #file-btn.file-selected {
            background: #ff4444;
            color: white;
            border-color: #ff4444;
        }
        #message-input {
            flex: 1;
            padding: 6px 12px;
            border: 1px solid var(--border-light);
            border-radius: 16px;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            overflow-y: auto;
            max-height: 250px;
            min-height: 24px;
            line-height: 1.5;
            background: var(--bg-input);
            color: var(--text-primary);
            box-sizing: border-box;
        }
        #message-input:focus {
            outline: none;
            border-color: var(--border-focus);
        }
        #send-btn {
            width: 40px;
            height: 40px;
            background: var(--bg-send);
            color: var(--text-on-send);
            border: none;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-weight: bold;
        }
        #send-btn:hover:not(:disabled) {
            background: var(--bg-send-hover);
        }
        #send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            color: #666;
        }

        /* ========== 模态框动画 ========== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active {
            display: flex;
        }

        .modal.active .modal-content {
            animation: modalContentEnter 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .modal.closing .modal-content {
            animation: modalContentExit 0.15s cubic-bezier(0.2, 0.9, 0.3, 1) forwards;
        }

        @keyframes modalContentEnter {
            0% {
                opacity: 0;
                transform: scale(0.7) translateX(5px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateX(0);
            }
        }

        @keyframes modalContentExit {
            0% {
                opacity: 1;
                transform: scale(1);
            }
            100% {
                opacity: 0;
                transform: scale(0.8);
            }
        }

        .modal-content {
            background: var(--bg-modal);
            width: 90%;
            max-width: 400px;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            color: var(--text-primary);
            border: 1px solid var(--border-light);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .modal-header h3 {
            margin: 0;
            font-weight: 400;
            font-size: 1.2rem;
        }
        .modal-close {
            width: 32px;
            height: 32px;
            background: var(--bg-button);
            border: none;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
        }
        .modal-close:hover {
            background: var(--bg-button-hover);
        }

        /* 全屏文本模态框 */
        #fullscreen-text-modal .modal-content {
            width: 90%;
            max-width: 800px;
            height: 85vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        .fullscreen-text-content {
            flex: 1;
            overflow-y: auto;
            white-space: pre-wrap;
            padding: 12px;
            background: var(--bg-input);
            color: var(--text-primary);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            font-size: var(--message-font-size);
            line-height: 1.5;
        }

        /* ========== 设置模态框 ========== */
        #settings-modal .modal-content {
            display: flex;
            flex-direction: column;
            max-height: 80vh;
            padding: 20px 20px 10px 20px;
        }
        #settings-modal .modal-header {
            flex-shrink: 0;
        }
        .settings-scroll-area {
            overflow-y: auto;
            padding-right: 4px;
            margin-bottom: 10px;
            flex: 1;
            transition: font-size 0.2s;
        }
        /* 卡片模式开启时，设置窗口字体缩小10% */
        .settings-scroll-area.card-mode {
            font-size: 0.9em;
        }
        .settings-scroll-area::-webkit-scrollbar {
            width: 6px;
        }
        .settings-scroll-area::-webkit-scrollbar-track {
            background: transparent;
        }
        .settings-scroll-area::-webkit-scrollbar-thumb {
            background: var(--border-light);
            border-radius: 3px;
        }

        /* 设置项基础样式 */
        .setting-item {
            display: grid;
            grid-template-columns: auto 1fr;
            align-items: start;
            gap: 10px;
            padding: 10px 0;
            transition: all 0.2s;
            border-bottom: none;
        }
        .setting-item.with-separator {
            border-bottom: 1px solid var(--border-light);
        }
        .setting-item.with-card {
            background: var(--bg-button);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
        }
        .setting-item.with-card.with-separator {
            border: 1px solid var(--border-light);
            border-bottom: 1px solid var(--border-light);
        }

        .setting-label {
            font-size: 15px;
            color: var(--text-primary);
            white-space: nowrap;
            line-height: 28px;
            overflow-x: auto;
            max-width: 140px;
        }
        .setting-control {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
            min-width: 180px;

    <script>

            const settingsClose = document.getElementById('settings-close');
            const settingsScroll = document.getElementById('settings-scroll');
            const importExportBtn = document.getElementById('import-export-btn');
            const importExportModal = document.getElementById('import-export-modal');
            const importExportClose = document.getElementById('import-export-close');
            const importBtn = document.getElementById('import-btn');

            const globalLoader = document.getElementById('global-loader');
            const messageModal = document.getElementById('message-modal');

            const garbledModalClose = document.getElementById('garbled-modal-close');

            const fullscreenTextModal = document.getElementById('fullscreen-text-modal');

            const rgbPickerBtn = document.getElementById('rgb-picker-btn');

            const memoryOn = document.getElementById('memory-on');

            const timestampOn = document.getElementById('timestamp-on');

            // 当前会话的历史记录
            let conversationHistory = [];

            let isComposing = false;
            messageInput.addEventListener('compositionstart', () => { isComposing = true; });
            messageInput.addEventListener('compositionend', () => { isComposing = false; });

            let settings = {
                toolbar: true,
                hideKey: false,
                memory: true,
                showTimestamp: true,
                soundEnabled: true,
                lazyOutput: false,
                showSeparators: true,
                itemBox: false,
                messageShadow: false,
                dialogStyle: 'bubble',
                fontSize: 100,
                maxTokens: 4096,
                theme: 'default',
                customColor: '',
                apiKey: ''
            };

            let autoScrollEnabled = true;
            let loaderCounter = 0;
            let loaderTimer = null;

            let audioCtx = null;
            function playClickSound() {
                if (!settings.soundEnabled) return;
                try {
                    if (!audioCtx) {
                        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    }
                    if (audioCtx.state === 'suspended') {
                        audioCtx.resume();
                    }
                    const now = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(800, now);
                    osc.frequency.exponentialRampToValueAtTime(300, now + 0.03);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.03);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(now);
                    osc.stop(now + 0.03);
                } catch (e) {}
            }

            document.addEventListener('click', (e) => {
                const target = e.target;
                if (target.tagName === 'BUTTON' && !target.disabled) {
                    playClickSound();
                }
            });

            function hexToRgb(hex) {
                const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
                return result ? {
                    r: parseInt(result[1], 16),
                    g: parseInt(result[2], 16),
                    b: parseInt(result[3], 16)
                } : null;
            }

            function rgbToHsl(r, g, b) {
                r /= 255; g /= 255; b /= 255;
                const max = Math.max(r, g, b);
                const min = Math.min(r, g, b);
                let h, s, l = (max + min) / 2;

                if (max === min) {
                    h = s = 0;
                } else {
                    const d = max - min;
                    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                    switch (max) {
                        case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                        case g: h = (b - r) / d + 2; break;
                        case b: h = (r - g) / d + 4; break;
                    }
                    h /= 6;
                }
                return [h * 360, s * 100, l * 100];
            }

            function hslToHex(h, s, l) {
                l /= 100;
                const a = s * Math.min(l, 1 - l) / 100;
                const f = n => {
                    const k = (n + h / 30) % 12;
                    const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
                    return Math.round(255 * color).toString(16).padStart(2, '0');
                };
                return `#${f(0)}${f(8)}${f(4)}`;
            }

            function applyCustomTheme(color) {
                const rgb = hexToRgb(color);
                if (!rgb) return;
                const [h, s, l] = rgbToHsl(rgb.r, rgb.g, rgb.b);

                const bgSat = Math.max(0, s * 0.5);
                const bgLight = Math.min(100, l + 20);
                const bgColor = hslToHex(h, bgSat, bgLight);

                const userSat = Math.max(0, s * 0.8);
                const userLight = Math.min(100, l + 10);
                const userColor = hslToHex(h, userSat, userLight);

                const aiSat = Math.max(0, s * 0.7);
                const aiLight = Math.max(0, l - 5);
                const aiColor = hslToHex(h, aiSat, aiLight);

                const sendLight = Math.max(0, l - 30);
                const sendColor = hslToHex(h, s, sendLight);

                const sendHoverLight = Math.max(0, sendLight - 20);
                const sendHoverColor = hslToHex(h, s, sendHoverLight);

                const borderLight = Math.min(100, l + 20);
                const borderSat = Math.max(0, s * 0.6);
                const borderColor = hslToHex(h, borderSat, borderLight);

                const focusLight = Math.max(0, l - 10);
                const focusColor = hslToHex(h, s, focusLight);

                const root = document.documentElement;
                root.style.setProperty('--bg-body', bgColor);
                root.style.setProperty('--user-bubble', userColor);
                root.style.setProperty('--ai-bubble', aiColor);
                root.style.setProperty('--bg-send', sendColor);
                root.style.setProperty('--bg-send-hover', sendHoverColor);
                root.style.setProperty('--border-light', borderColor);
                root.style.setProperty('--border-focus', focusColor);

                const sendRgb = hexToRgb(sendColor);
                const sendBrightness = (sendRgb.r * 299 + sendRgb.g * 587 + sendRgb.b * 114) / 1000;
                root.style.setProperty('--text-on-send', sendBrightness > 128 ? '#111' : '#eee');

                // 根据背景亮度设置按钮渐变和阴影混合色
                if (sendBrightness > 128) {
                    // 浅色背景
                    root.style.setProperty('--button-start-color', '#000000');
                    root.style.setProperty('--button-end-color', '#333333');
                    root.style.setProperty('--button-text', '#ffffff');
                    root.style.setProperty('--button-hover-brightness', '0.9');
                    root.style.setProperty('--shadow-mix-color', 'black');
                } else {
                    // 深色背景
                    root.style.setProperty('--button-start-color', '#ffffff');
                    root.style.setProperty('--button-end-color', '#cccccc');
                    root.style.setProperty('--button-text', '#000000');
                    root.style.setProperty('--button-hover-brightness', '1.2');
                    root.style.setProperty('--shadow-mix-color', 'white');
                }
            }

            function clearCustomTheme() {
                const root = document.documentElement;
                root.style.removeProperty('--bg-body');
                root.style.removeProperty('--user-bubble');
                root.style.removeProperty('--ai-bubble');
                root.style.removeProperty('--bg-send');
                root.style.removeProperty('--bg-send-hover');
                root.style.removeProperty('--border-light');
                root.style.removeProperty('--border-focus');
                root.style.removeProperty('--text-on-send');
                root.style.removeProperty('--button-start-color');
                root.style.removeProperty('--button-end-color');
                root.style.removeProperty('--button-text');
                root.style.removeProperty('--button-hover-brightness');
                root.style.removeProperty('--shadow-mix-color');
            }

            function updateFontSize(value) {
                const clampedValue = Math.max(10, Math.min(160, value));
                const fontSize = clampedValue / 100 * 15;
                document.documentElement.style.setProperty('--message-font-size', fontSize + 'px');
            }

            // 保存所有对话数据到 localStorage
            function saveConversations() {
                localStorage.setItem('chatConversations', JSON.stringify({
                    conversations,
                    currentId: currentConversationId,
                    nextId: nextConvId
                }));
            }

            // 加载对话数据
            function loadConversations() {
                const saved = localStorage.getItem('chatConversations');
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        conversations = data.conversations || [];
                        currentConversationId = data.currentId || null;
                        nextConvId = data.nextId || 1;
                        conversations.forEach(c => {
                            if (!c.history) c.history = [];
                        });
                        if (!currentConversationId || !conversations.find(c => c.id === currentConversationId)) {
                            createNewConversation();
                        } else {
                            const current = conversations.find(c => c.id === currentConversationId);
                            conversationHistory = current ? current.history : [];
                        }
                    } catch (e) {
                        console.warn('解析对话失败', e);
                        createNewConversation();
                    }
                } else {
                    createNewConversation();
                }
                renderConversationList();
                renderHistory();
            }

            // 创建新对话
            function createNewConversation(name = null) {
                const id = nextConvId++;
                const defaultName = name || `对话 ${id}`;
                const newConv = {
                    id,
                    name: defaultName,
                    history: []
                };
                conversations.push(newConv);
                currentConversationId = id;
                conversationHistory = newConv.history;
                saveConversations();
                renderConversationList();
                messagesDiv.innerHTML = '';
                autoScrollEnabled = true;
                return newConv;
            }

            // 删除对话
            function deleteConversation(id) {
                const index = conversations.findIndex(c => c.id === id);
                if (index !== -1) {
                    conversations.splice(index, 1);
                    if (conversations.length === 0) {
                        createNewConversation();
                    } else {
                        if (currentConversationId === id) {
                            currentConversationId = conversations[0].id;
                            conversationHistory = conversations[0].history;
                        }
                    }
                    saveConversations();
                    renderConversationList();
                    renderHistory();
                }
            }

            // 重命名对话（仅更新内存，不触发重新渲染）
            function renameConversation(id, newName) {
                const conv = conversations.find(c => c.id === id);
                if (conv) {
                    conv.name = newName.trim() || conv.name;
                    saveConversations();
                }
            }

            // 切换对话
            function switchConversation(id) {
                if (id === currentConversationId) return;
                const conv = conversations.find(c => c.id === id);
                if (conv) {
                    currentConversationId = id;
                    conversationHistory = conv.history;
                    saveConversations();
                    renderConversationList();
                    renderHistory();
                }
            }

            // 根据用户第一条消息自动命名对话
            function autoNameConversation(content) {
                const conv = conversations.find(c => c.id === currentConversationId);
                if (!conv) return;
                let name = content.replace(/\s+/g, ' ').trim().slice(0, 6);
                if (!name) name = `对话 ${conv.id}`;
                conv.name = name;
                saveConversations();
                renderConversationList();
            }

            // 渲染侧边栏对话列表
            function renderConversationList() {
                conversationList.innerHTML = '';
                conversations.forEach(conv => {
                    const item = document.createElement('div');
                    item.className = `conversation-item ${conv.id === currentConversationId ? 'active' : ''}`;
                    item.dataset.id = conv.id;

                    const nameSpan = document.createElement('span');
                    nameSpan.className = 'conv-name';
                    nameSpan.textContent = conv.name;

                    const actions = document.createElement('div');
                    actions.className = 'conv-actions';

                    const renameBtn = document.createElement('button');
                    renameBtn.innerHTML = '✎';
                    renameBtn.title = '重命名';
                    renameBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const oldName = conv.name;
                        const input = document.createElement('input');
                        input.type = 'text';
                        input.className = 'conv-rename-input';
                        input.value = oldName;
                        input.dataset.renaming = 'false'; // 防止重复

                        const handleRename = () => {
                            if (input.dataset.renaming === 'true') return;
                            input.dataset.renaming = 'true';
                            const newName = input.value.trim();
                            if (newName && newName !== oldName) {
                                conv.name = newName;
                                saveConversations();
                                nameSpan.textContent = newName;
                            }
                            item.replaceChild(nameSpan, input);
                        };

                        input.addEventListener('keydown', (e) => {
                            if (e.key === 'Enter') {
                                e.preventDefault();
                                handleRename();
                            } else if (e.key === 'Escape') {
                                // 标记此输入框是 Escape 退出的，防止 blur 再次处理
                                input.dataset.escape = 'true';
                                item.replaceChild(nameSpan, input);
                            }
                        });

                        input.addEventListener('blur', () => {
                            if (input.dataset.escape === 'true') {
                                // Escape 已经处理，清除标志并跳过
                                delete input.dataset.escape;
                                return;
                            }
                            handleRename();
                        });

                        item.replaceChild(input, nameSpan);
                        input.focus();
                    });

                    const deleteBtn = document.createElement('button');
                    deleteBtn.innerHTML = '🗑';
                    deleteBtn.title = '删除';
                    deleteBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (confirm('确定删除此对话吗？')) {
                            deleteConversation(conv.id);
                        }
                    });

                    actions.appendChild(renameBtn);
                    actions.appendChild(deleteBtn);

                    item.appendChild(nameSpan);
                    item.appendChild(actions);

                    item.addEventListener('click', () => {
                        switchConversation(conv.id);
                    });

                    conversationList.appendChild(item);
                });
            }

            function loadSettings() {

                document.body.classList.remove('style-bubble', 'style-android', 'style-immersive');

                    document.body.classList.add('style-bubble');

                    document.body.classList.add('style-android');

                styleOptions.forEach(btn => {

                if (settings.theme === 'custom' && settings.customColor) {
                    document.body.className = document.body.className.replace(/theme-\S+/g, '').trim();
                    applyCustomTheme(settings.customColor);

                    if (settings.theme !== 'default') {

            // ========== 全屏 Markdown 渲染 ==========
            const fullscreenCache = new Map();
            const fullscreenRendering = new Map();

            async function openFullscreenText(originalText) {
                // 先显示模态框，内容显示加载中
                fullscreenTextContent.innerHTML = '正在加载...';
                fullscreenTextModal.classList.remove('closing');
                fullscreenTextModal.classList.add('active');

                let renderTimer = setTimeout(() => {
                    globalLoader.classList.add('active');
                }, 3000);

                try {
                    await ensureMarkedLoaded();

                    if (fullscreenCache.has(originalText)) {
                        fullscreenTextContent.innerHTML = fullscreenCache.get(originalText);
                        clearTimeout(renderTimer);
                        globalLoader.classList.remove('active');
                        return;
                    }

                    // 异步渲染
                    const html = await new Promise((resolve) => {
                        setTimeout(() => {
                            try {
                                const result = marked.parse(originalText, { async: false });
                                resolve(result);
                            } catch (e) {
                                resolve(originalText); // 渲染失败回退纯文本
                            }
                        }, 0);
                    });

                    clearTimeout(renderTimer);
                    globalLoader.classList.remove('active');
                    fullscreenCache.set(originalText, html);
                    if (fullscreenTextModal.classList.contains('active')) {
                        fullscreenTextContent.innerHTML = html;
                    }
                } catch (e) {
                    clearTimeout(renderTimer);
                    globalLoader.classList.remove('active');
                    fullscreenTextContent.innerHTML = '渲染失败：' + e.message;
                }
            }

            function closeFullscreenTextModal() {
                // 清除可能残留的定时器和遮罩
                if (loaderTimer) {
                    clearTimeout(loaderTimer);
                    loaderTimer = null;
                }
                globalLoader.classList.remove('active');
                fullscreenTextModal.classList.add('closing');
                fullscreenTextModal.addEventListener('animationend', function onAnimationEnd() {
                    fullscreenTextModal.classList.remove('active', 'closing');
                    fullscreenTextModal.removeEventListener('animationend', onAnimationEnd);
                }, { once: true });
            }
            fullscreenTextClose.addEventListener('click', closeFullscreenTextModal);
            fullscreenTextModal.addEventListener('click', (e) => {
                if (e.target === fullscreenTextModal) closeFullscreenTextModal();
            });

            // ========== 按需渲染 Markdown 的 IntersectionObserver ==========
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const bubble = entry.target;
                        if (bubble.dataset.rendered === 'true') return;
                        const original = bubble.dataset.originalContent;
                        if (original) {
                            ensureMarkedLoaded().then(() => {
                                bubble.innerHTML = renderMarkdown(original);
                                bubble.dataset.rendered = 'true';
                            }).catch(() => {
                                console.warn('Markdown 加载失败，无法渲染');
                            });
                        }
                        observer.unobserve(bubble);
                    }
                });
            }, { rootMargin: '100px 0px' });

            // ========== Marked 静默加载与缓存 ==========
            let markedLoadingPromise = null;

            function ensureMarkedLoaded() {
                if (window.marked) {
                    return Promise.resolve();
                }
                if (markedLoadingPromise) {
                    return markedLoadingPromise;
                }
                markedLoadingPromise = new Promise((resolve, reject) => {
                    const cached = localStorage.getItem('marked-lib');
                    if (cached) {
                        try {
                            new Function(cached)();
                            if (window.marked) {
                                console.log('Marked 从缓存加载成功');
                                resolve();
                            } else {
                                throw new Error('缓存执行后未定义 marked');
                            }
                        } catch (e) {
                            console.warn('缓存 marked 执行失败，将重新下载', e);
                            localStorage.removeItem('marked-lib');
                            fetchAndCacheMarked(resolve, reject);
                        }
                    } else {
                        fetchAndCacheMarked(resolve, reject);
                    }
                });
                return markedLoadingPromise;
            }

            function fetchAndCacheMarked(resolve, reject) {
                const scriptUrl = 'https://cdn.jsdelivr.net/npm/marked/marked.min.js';
                fetch(scriptUrl)
                    .then(response => {
                        if (!response.ok) throw new Error('网络错误');
                        return response.text();
                    })

            // 乱码检测
            function isGarbled(text) {
                if (!text) return false;
                let garbledCount = 0;
                for (let i = 0; i < text.length; i++) {
                    const code = text.charCodeAt(i);
                    if ((code < 32 && code !== 9 && code !== 10 && code !== 13) || code === 127) {
                        garbledCount++;
                    } else if (code === 0xFFFD) {
                        garbledCount++;
                    }
                }
                return garbledCount > 64;
            }

                        try {

            // ========== 优化后的文本朗读功能 ==========
            let cachedVoices = null;
            function getVoices() {
                if (cachedVoices) return Promise.resolve(cachedVoices);
                return new Promise((resolve) => {
                    const voices = speechSynthesis.getVoices();
                    if (voices.length) {
                        cachedVoices = voices;
                        resolve(voices);
                    } else {
                        speechSynthesis.addEventListener('voiceschanged', () => {
                            const v = speechSynthesis.getVoices();
                            cachedVoices = v;
                            resolve(v);
                        }, { once: true });
                    }
                });
            }

            // 过滤 emoji
            function removeEmoji(text) {
                return text.replace(/[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, '');
            }

            let speakingLock = false; // 防止重复初始化
            function speakText(text, button) {
                if (!text) return;

                if (!window.speechSynthesis) {
                    alert('您的浏览器不支持语音朗读功能。');
                    return;
                }

                // 过滤 emoji
                const cleanText = removeEmoji(text);
                if (!cleanText) {
                    alert('没有可朗读的文本内容（仅包含表情符号）');
                    return;
                }

                // 如果正在朗读，则取消
                if (speechSynthesis.speaking) {
                    speechSynthesis.cancel();
                    if (button) {
                        button.classList.remove('speaking');
                        button.textContent = '🔊';
                    }
                    return;
                }

                // 防止快速连续点击（如果正在初始化，忽略）
                if (speakingLock) return;
                speakingLock = true;

                getVoices().then(voices => {
                    const utterance = new SpeechSynthesisUtterance(cleanText);
                    utterance.lang = 'zh-CN';
                    utterance.rate = 1;
                    utterance.pitch = 1;
                    utterance.volume = 1;

                    const zhVoice = voices.find(v => v.lang.includes('zh'));
                    if (zhVoice) utterance.voice = zhVoice;

                    utterance.onstart = () => {
                        if (button) {
                            button.classList.add('speaking');
                            button.textContent = '■';
                        }
                        speakingLock = false;
                    };

                    utterance.onend = () => {
                        if (button) {
                            button.classList.remove('speaking');
                            button.textContent = '🔊';
                        }
                        speakingLock = false;
                    };

                    utterance.onerror = (event) => {
                        console.warn('语音合成错误', event);
                        if (button) {
                            button.classList.remove('speaking');
                            button.textContent = '🔊';
                        }
                        speakingLock = false;
                    };

                    speechSynthesis.speak(utterance);
                }).catch(err => {
                    console.error('获取语音列表失败', err);
                    speakingLock = false; // 释放锁
                });
            }

            window.addEventListener('beforeunload', () => {
                if (speechSynthesis.speaking) {
                    speechSynthesis.cancel();
                }
            });

            sendBtn.addEventListener('click', async () => {
                const userMessage = messageInput.value.trim();
                if (!userMessage && !selectedFile) return;

                // 立即禁用发送按钮，防止重复点击
                sendBtn.disabled = true;

                const timestamp = Date.now();
                // 记录当前对话ID，确保回复属于正确的对话
                const targetConvId = currentConversationId;

                let userContent = userMessage;
                if (selectedFile && fileContent) {
                    userContent = `[文件: ${selectedFile.name}]\n\n${fileContent}\n\n${userMessage}`;
                }

                // 如果是新对话的第一条消息，自动命名
                if (conversationHistory.length === 0) {
                    autoNameConversation(userMessage);
                }

                appendMessage('user', userContent, timestamp);
                messageInput.value = '';
                autoResize();

                const apiKey = apiKeyInput.value.trim();
                if (!apiKey) {
                    appendMessage('ai', '请先输入有效的 API 密钥。', Date.now());
                    sendBtn.disabled = false;
                    return;
                }

                let requestMessages = [];

                if (settings.memory) {
                    requestMessages = requestMessages.concat(conversationHistory.map(msg => ({
                        role: msg.role,
                        content: msg.content
                    })));
                }

                requestMessages.push({ role: 'user', content: userContent });

                const requestBody = {
                    model: 'deepseek-chat',
                    messages: requestMessages,
                    stream: true
                };
                if (settings.maxTokens > 0) {
                    requestBody.max_tokens = settings.maxTokens;
                } else {
                    requestBody.max_tokens = 8192;
                }

                const wrapper = document.createElement('div');
                wrapper.className = 'message-wrapper ai-wrapper';
                const loadingDiv = document.createElement('div');
                loadingDiv.className = 'ai-loading';
                loadingDiv.innerHTML = '<span class="spinner"></span> 对方正在输入中...';
                wrapper.appendChild(loadingDiv);
                const bubble = document.createElement('div');
                bubble.className = 'message ai-message';
                wrapper.appendChild(bubble);
                messagesDiv.appendChild(wrapper);

                try {
                    const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${apiKey}`
                        },
                        body: JSON.stringify(requestBody)
                    });

                    if (!response.ok) throw new Error(`API 请求失败: ${response.status}`);

                    if (settings.lazyOutput) {
                        loadingDiv.innerHTML = '<span class="spinner"></span> 惰性输出加载中...';
                    }

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder('utf-8');
                    let fullContent = '';

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        const chunk = decoder.decode(value);
                        const lines = chunk.split('\n').filter(line => line.trim() !== '');
                        for (const line of lines) {
                            if (line.startsWith('data: ')) {
                                const data = line.slice(6);
                                if (data === '[DONE]') continue;
                                try {
                                    const json = JSON.parse(data);
                                    const content = json.choices[0]?.delta?.content || '';
                                    fullContent += content;
                                    if (!settings.lazyOutput) {
                                        // 如果当前wrapper还在DOM中（即未切换对话），才更新UI
                                        if (wrapper.parentNode) {
                                            if (window.marked) {
                                                bubble.innerHTML = renderMarkdown(fullContent);
                                            } else {
                                                bubble.textContent = fullContent;
                                            }
                                            if (autoScrollEnabled) {
                                                messagesDiv.scrollTop = messagesDiv.scrollHeight;
                                            }
                                        }
                                    }
                                } catch (e) {
                                    console.warn('解析错误', e);
                                }
                            }
                        }
                    }

                    // 移除loading指示器
                    if (wrapper.parentNode) {
                        wrapper.removeChild(loadingDiv);
                    }

                    // 最终内容处理（惰性输出）
                    if (settings.lazyOutput) {
                        // 如果wrapper还在，才执行动画
                        if (wrapper.parentNode) {
                            await lazyOutput(bubble, fullContent);
                        }
                        // 无论是否在，最终内容都要保存
                    }

                    // 确保最终内容被设置（如果wrapper还在）
                    if (wrapper.parentNode) {
                        if (settings.lazyOutput || !window.marked) {
                            bubble.textContent = fullContent;
                        } else {
                            bubble.innerHTML = renderMarkdown(fullContent);
                        }
                        const avatar = document.createElement('div');
                        avatar.className = 'ai-avatar';
                        avatar.textContent = 'AI';
                        wrapper.insertBefore(avatar, bubble);
                    }

                    bubble.dataset.originalContent = fullContent;

                    // 成功发送后，如果有选中文件，清除选中状态
                    if (selectedFile) {
                        resetFileSelection();
                    }

                    // 无论当前是否还在该对话，都将消息追加到正确的对话历史中
                    if (settings.memory) {
                        const targetConv = conversations.find(c => c.id === targetConvId);
                        if (targetConv) {
                            targetConv.history.push({ role: 'user', content: userContent, timestamp });
                            targetConv.history.push({ role: 'assistant', content: fullContent, timestamp: Date.now() });
                            saveConversations();
                        }
                        // 如果当前对话就是目标对话，同时更新conversationHistory引用（但已经由targetConv处理）
                        if (currentConversationId === targetConvId) {
                            conversationHistory = targetConv.history;
                        }
                    }

                    // 如果wrapper还在，添加工具栏
                    if (wrapper.parentNode && settings.toolbar) {
                        const footer = document.createElement('div');
                        footer.className = 'ai-footer';
                        const copyBtn = document.createElement('button');
                        copyBtn.className = 'copy-btn';
                        copyBtn.textContent = '📋';
                        copyBtn.addEventListener('click', async () => {
                            try {
                                await navigator.clipboard.writeText(bubble.textContent);
                                copyBtn.textContent = '✓';
                                setTimeout(() => copyBtn.textContent = '📋', 1000);
                            } catch (err) {
                                alert('复制失败，请手动复制');
                                console.error('复制错误:', err);
                            }
                        });
                        footer.appendChild(copyBtn);

                        const fullscreenBtn = document.createElement('button');
                        fullscreenBtn.className = 'fullscreen-btn';
                        fullscreenBtn.textContent = '🔍';
                        fullscreenBtn.title = '全屏查看';
                        fullscreenBtn.addEventListener('click', () => {
                            openFullscreenText(bubble.dataset.originalContent);
                        });
                        footer.appendChild(fullscreenBtn);

                        const downloadBtn = document.createElement('button');
                        downloadBtn.className = 'download-btn';
                        downloadBtn.textContent = '⬇️';
                        downloadBtn.title = '下载为TXT';
                        downloadBtn.addEventListener('click', () => {
                            downloadTxt(bubble.textContent, `chatgr_${Date.now()}.txt`);
                        });
                        footer.appendChild(downloadBtn);

                        const speakBtn = document.createElement('button');
                        speakBtn.className = 'speak-btn';
                        speakBtn.textContent = '🔊';
                        speakBtn.title = '朗读';
                        speakBtn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            speakText(bubble.textContent, speakBtn);
                        });
                        footer.appendChild(speakBtn);

                        wrapper.appendChild(footer);
                    }
                } catch (error) {
                    // 发生错误时，清除文件选中状态
                    if (selectedFile) {
                        resetFileSelection();
                    }
                    if (wrapper.parentNode) {
                        if (wrapper.contains(loadingDiv)) {
                            wrapper.removeChild(loadingDiv);
                        }
                        const avatar = document.createElement('div');
                        avatar.className = 'ai-avatar';
                        avatar.textContent = 'AI';
                        wrapper.insertBefore(avatar, bubble);
                        bubble.textContent = `错误：${error.message}`;
                    }
                } finally {
                    // 恢复发送按钮
                    sendBtn.disabled = false;
                }
            });

            function appendMessage(role, content, timestamp = null, deferRender = false) {
                if (role === 'user' && settings.showTimestamp) {
                    const timeDiv = document.createElement('div');
                    timeDiv.className = 'time-divider';
                    const date = timestamp ? new Date(timestamp) : new Date();
                    const year = date.getFullYear();
                    const month = String(date.getMonth() + 1).padStart(2, '0');
                    const day = String(date.getDate()).padStart(2, '0');
                    const hour = String(date.getHours()).padStart(2, '0');
                    const minute = String(date.getMinutes()).padStart(2, '0');
                    timeDiv.textContent = `--- ${year}年${month}月${day}日 ${hour}时${minute}分 ---`;
                    messagesDiv.appendChild(timeDiv);
                }

                const wrapper = document.createElement('div');
                wrapper.className = `message-wrapper ${role === 'user' ? 'user-wrapper' : 'ai-wrapper'}`;

                if (role === 'ai') {
                    const avatar = document.createElement('div');
                    avatar.className = 'ai-avatar';
                    avatar.textContent = 'AI';
                    wrapper.appendChild(avatar);
                }
                const bubble = document.createElement('div');
                bubble.className = `message ${role === 'user' ? 'user-message' : 'ai-message'}`;

                bubble.dataset.originalContent = content;

                if (role === 'user') {
                    bubble.textContent = content;
                } else {
                    if (deferRender) {
                        bubble.textContent = content;
                        observer.observe(bubble);
                    } else {
                        if (window.marked) {
                            bubble.innerHTML = renderMarkdown(content);
                        } else {
                            bubble.textContent = content;
                        }
                        bubble.dataset.rendered = 'true';
                    }
                }
                wrapper.appendChild(bubble);

                if (role === 'ai' && settings.toolbar && !content.startsWith('错误')) {
                    const footer = document.createElement('div');
                    footer.className = 'ai-footer';
                    const copyBtn = document.createElement('button');
                    copyBtn.className = 'copy-btn';
                    copyBtn.textContent = '📋';
                    copyBtn.addEventListener('click', async () => {
                        try {
                            await navigator.clipboard.writeText(bubble.textContent);
                            copyBtn.textContent = '✓';
                            setTimeout(() => copyBtn.textContent = '📋', 1000);
                        } catch (err) {
                            alert('复制失败，请手动复制');
                            console.error('复制错误:', err);
                        }
                    });
                    footer.appendChild(copyBtn);
                    const fullscreenBtn = document.createElement('button');
                    fullscreenBtn.className = 'fullscreen-btn';
                    fullscreenBtn.textContent = '🔍';
                    fullscreenBtn.title = '全屏查看';
                    fullscreenBtn.addEventListener('click', () => {
                        openFullscreenText(bubble.dataset.originalContent);
                    });
                    footer.appendChild(fullscreenBtn);
                    const downloadBtn = document.createElement('button');
                    downloadBtn.className = 'download-btn';
                    downloadBtn.textContent = '⬇️';
                    downloadBtn.title = '下载为TXT';
                    downloadBtn.addEventListener('click', () => {
                        downloadTxt(bubble.textContent, `chatgr_${Date.now()}.txt`);
                    });
                    footer.appendChild(downloadBtn);
                    const speakBtn = document.createElement('button');
                    speakBtn.className = 'speak-btn';
                    speakBtn.textContent = '🔊';
                    speakBtn.title = '朗读';
                    speakBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        speakText(bubble.textContent, speakBtn);
                    });
                    footer.appendChild(speakBtn);
                    wrapper.appendChild(footer);
                }

                messagesDiv.appendChild(wrapper);
                if (autoScrollEnabled) {
                    messagesDiv.scrollTop = messagesDiv.scrollHeight;
                }
            }

            messageInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey && !isComposing) {
                    e.preventDefault();
                    if (!sendBtn.disabled) sendBtn.click();
                }
            });

            function isAtBottom() {
                const scrollBottom = messagesDiv.scrollHeight - messagesDiv.scrollTop - messagesDiv.clientHeight;
                return scrollBottom < 5;
            }

            function updateScrollState() {
                autoScrollEnabled = isAtBottom();
            }

            messagesDiv.addEventListener('scroll', updateScrollState);
            updateScrollState();
        })();
    </script>
</body>
</html>
